global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  500ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

frontend http_front
    bind *:80
    default_backend http_back

    acl is_elasticsearch path_beg /elasticsearch
    acl is_kibana path_beg /kibana

    use_backend elasticsearch_back if is_elasticsearch
    use_backend kibana_back if is_kibana

backend http_back
    balance roundrobin
    server web1 127.0.0.1:8080 check

backend elasticsearch_back
    balance roundrobin
    server es1 elasticsearch:9201 check

backend kibana_back
    balance roundrobin
    server kb1 kibana:5602 check

listen stats
    bind *:80
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin
