---
- name: Deploy Elasticsearch
  hosts: elasticsearch
  become: true

  vars:
    es_version: "8.x"
    es_heap_size: "1g"

  tasks:
    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - gnupg2
          - curl
        state: present
        update_cache: true

    - name: Add Elasticsearch GPG key
      apt_key:
        url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        state: present

    - name: Add Elasticsearch repository
      apt_repository:
        repo: "deb https://artifacts.elastic.co/packages/{{ es_version }}/apt stable main"
        state: present
        filename: elastic

    - name: Install Elasticsearch
      apt:
        name: elasticsearch
        state: present
        update_cache: true

    - name: Configure JVM heap size
      copy:
        content: |
          -Xms{{ es_heap_size }}
          -Xmx{{ es_heap_size }}
        dest: /etc/elasticsearch/jvm.options.d/heap.options
        owner: elasticsearch
        group: elasticsearch
        mode: "0644"
      notify: restart elasticsearch

    - name: Deploy Elasticsearch configuration
      copy:
        src: ../config/elasticsearch.yml
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: elasticsearch
        group: elasticsearch
        mode: "0660"
      notify: restart elasticsearch

    - name: Enable and start Elasticsearch
      systemd:
        name: elasticsearch
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: restart elasticsearch
      systemd:
        name: elasticsearch
        state: restarted
