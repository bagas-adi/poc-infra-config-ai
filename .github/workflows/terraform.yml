name: Terraform

on:
  push:
    branches: [main]
    paths:
      - '**/terraform/**'
  pull_request:
    branches: [main]
    paths:
      - '**/terraform/**'

jobs:
  terraform-validate:
    name: Validate - ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - elasticsearch
          - kibana
          - haproxy
          - consul
          - postgresql
          - mysql
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        working-directory: ${{ matrix.component }}/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.component }}/terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ matrix.component }}/terraform
        run: terraform fmt -check -recursive

  terraform-plan:
    name: Plan - ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        component:
          - elasticsearch
          - kibana
          - haproxy
          - consul
          - postgresql
          - mysql
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        working-directory: ${{ matrix.component }}/terraform
        run: terraform init -backend=false

      - name: Terraform Plan
        working-directory: ${{ matrix.component }}/terraform
        run: terraform plan -no-color
        continue-on-error: true

  terraform-apply:
    name: Apply - ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        component:
          - elasticsearch
          - kibana
          - haproxy
          - consul
          - postgresql
          - mysql
      max-parallel: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Install Multipass
        run: |
          sudo snap install multipass

      - name: Terraform Init
        working-directory: ${{ matrix.component }}/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ matrix.component }}/terraform
        run: terraform apply -auto-approve
