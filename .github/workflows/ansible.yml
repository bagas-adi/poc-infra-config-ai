name: Ansible

on:
  push:
    branches: [main]
    paths:
      - '**/ansible/**'
      - '**/config/**'
  pull_request:
    branches: [main]
    paths:
      - '**/ansible/**'
      - '**/config/**'

jobs:
  ansible-lint:
    name: Lint - ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - elasticsearch
          - kibana
          - haproxy
          - consul
          - postgresql
          - mysql
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and ansible-lint
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        working-directory: ${{ matrix.component }}/ansible
        run: ansible-lint playbook.yml

  ansible-syntax-check:
    name: Syntax Check - ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - elasticsearch
          - kibana
          - haproxy
          - consul
          - postgresql
          - mysql
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: pip install ansible

      - name: Ansible Syntax Check
        working-directory: ${{ matrix.component }}/ansible
        run: ansible-playbook playbook.yml --syntax-check

  ansible-deploy:
    name: Deploy - ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: [ansible-lint, ansible-syntax-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        component:
          - elasticsearch
          - kibana
          - haproxy
          - consul
          - postgresql
          - mysql
      max-parallel: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        working-directory: ${{ matrix.component }}/ansible
        run: |
          ansible-playbook playbook.yml \
            -i ../../shared/ansible/inventory/hosts.yml \
            --diff
