name: PR Impact Analysis

on:
  pull_request:
    branches: [main]
    paths:
      - '**/config/**'
      - '**/terraform/**'
      - '**/ansible/**'

jobs:
  analyze:
    name: LLM Impact Analysis
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          AGENT_TOOLSDIRECTORY: /Users/bagas.pamungkas/projects/poc-task/llm-mac/poc-infra-config-ai/_runner

      - name: Install dependencies
        run: pip install -r infra-config-llmops/requirements.txt

      - name: Generate PR diff
        run: git diff origin/main...HEAD > /tmp/pr.diff

      - name: Run impact analysis
        working-directory: infra-config-llmops
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.analyzer \
            --diff-file /tmp/pr.diff \
            --pr ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }}
